<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>고양이카페 릴스 자동 생성기</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background:#0b0b0f; color:#fff; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 16px 60px; }
    .card { background:#141422; border:1px solid #26263b; border-radius:16px; padding:18px; }
    h1 { font-size: 22px; margin:0 0 10px; }
    p { margin: 8px 0 0; color:#c9c9dd; }
    label { display:block; margin: 14px 0 6px; color:#c9c9dd; font-size: 14px; }
    input, button { width:100%; padding:12px 12px; border-radius:12px; border:1px solid #2b2b44; background:#0f0f18; color:#fff; }
    button { background:#3b5bff; border:none; font-weight:700; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .status { margin-top:12px; padding:12px; border-radius:12px; background:#0f0f18; border:1px dashed #2b2b44; color:#c9c9dd; white-space: pre-wrap; }
    video { width:100%; border-radius: 16px; margin-top: 12px; background:#000; }
    img { width:100%; border-radius: 16px; margin-top: 12px; border:1px solid #26263b; }
    a.btn { display:inline-block; text-decoration:none; text-align:center; margin-top:12px; padding:12px 12px; border-radius:12px; background:#23c55e; color:#06120a; font-weight:800; width:100%; }
    .small { font-size: 12px; color:#9a9ab4; margin-top:10px; }
    code { background:#0f0f18; padding:2px 6px; border-radius:8px; border:1px solid #2b2b44; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>고양이카페 릴스 자동 생성기 (단일 템플릿)</h1>
      <p>영상 1개 업로드 → (앞 5초 삭제) → 이후 30초 릴스 + 고정 자막 + 썸네일 자동 추출</p>

      <label>영상 파일 (1개만)</label>
      <input id="file" type="file" accept="video/*" />

      <div style="margin-top:14px;">
        <button id="btn">릴스 만들기</button>
      </div>

      <div id="status" class="status" style="display:none;"></div>

      <div id="result" style="display:none;">
        <img id="thumb" alt="썸네일" />
        <a id="thumbLink" class="btn" href="#" download>썸네일 다운로드</a>

        <video id="video" controls playsinline></video>
        <a id="download" class="btn" href="#" download>영상 다운로드</a>
      </div>

      <div class="small">
        API 주소: <code id="apiText"></code><br/>
        ※ 테스트할 땐 ngrok 주소를 <code>API_BASE</code>에 넣어줘.
      </div>
    </div>
  </div>

<script>
  // ✅ 여기에 형 ngrok 주소(예: https://xxxxx.ngrok-free.dev) 넣으면 됨
  const API_BASE = "https://preantepenult-veta-gustoish.ngrok-free.dev";
  document.getElementById("apiText").innerText = API_BASE;

  const btn = document.getElementById("btn");
  const statusBox = document.getElementById("status");

  function showStatus(msg) {
    statusBox.style.display = "block";
    statusBox.innerText = msg;
  }

  btn.addEventListener("click", async () => {
    const fileInput = document.getElementById("file");
    const f = fileInput.files?.[0];
    if (!f) return alert("영상 파일을 선택해줘.");

    btn.disabled = true;
    showStatus("업로드/처리 중... (영상 길이에 따라 시간이 걸릴 수 있음)");

    try {
      // 연결 테스트
      const t = await fetch(API_BASE + "/test", {
        headers: { "ngrok-skip-browser-warning": "1" }
      });
      if (!t.ok) throw new Error("API 연결 실패");

      const form = new FormData();
      form.append("video", f); // ✅ 서버는 video 1개만 받음

      const res = await fetch(API_BASE + "/make", {
        method: "POST",
        body: form,
        headers: {
          "ngrok-skip-browser-warning": "1",
          "x-public-base-url": API_BASE
        }
      });

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { throw new Error("JSON이 아닌 응답:\n" + text.slice(0, 400)); }

      if (!res.ok) throw new Error(data.detail || data.error || "서버 오류");

      console.log("MAKE RESULT", data);

      showStatus(
        "완료 ✅\n" +
        `- 컷 시작: ${data.cutStartSec}s\n` +
        `- 길이: ${data.durationSec}s\n`
      );

      document.getElementById("result").style.display = "block";

      const v = document.getElementById("video");
      v.src = data.outputUrl;
      v.load();

      const d = document.getElementById("download");
      d.href = data.outputUrl;

      const img = document.getElementById("thumb");
      img.src = data.thumbnailUrl;

      const tl = document.getElementById("thumbLink");
      tl.href = data.thumbnailUrl;

    } catch (e) {
      console.error(e);
      showStatus("실패 ❌\n" + e.message);
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
